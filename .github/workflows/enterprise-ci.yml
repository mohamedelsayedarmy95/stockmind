name: Enterprise CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Job 1: Code quality (fast gate, no DB needed) ───────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npm run lint

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true   # advisory only — won't block; fix manually

  # ── Job 2: Tests (requires Postgres) ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stockmind_test
          POSTGRES_USER: stockmind
          POSTGRES_PASSWORD: stockmind123
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U stockmind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: stockmind
      DB_PASSWORD: stockmind123
      DB_DATABASE: stockmind_test
      JWT_ACCESS_SECRET: ci-access-secret-256bit
      JWT_REFRESH_SECRET: ci-refresh-secret-256bit
      NODE_ENV: test
      STORAGE_DRIVER: local
      UPLOAD_DIR: /tmp/uploads

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Enable pgcrypto
        run: |
          PGPASSWORD=stockmind123 psql -h localhost -U stockmind -d stockmind_test \
            -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;'

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run migration:run

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Coverage report
        run: npm run test:cov
        continue-on-error: true

  # ── Job 3: Migration safety check ───────────────────────────────────────────
  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stockmind_test
          POSTGRES_USER: stockmind
          POSTGRES_PASSWORD: stockmind123
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U stockmind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: stockmind
      DB_PASSWORD: stockmind123
      DB_DATABASE: stockmind_test
      JWT_ACCESS_SECRET: ci-access-secret-256bit
      JWT_REFRESH_SECRET: ci-refresh-secret-256bit
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Enable pgcrypto
        run: |
          PGPASSWORD=stockmind123 psql -h localhost -U stockmind -d stockmind_test \
            -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;'

      - name: Run migrations (forward)
        run: npm run migration:run

      - name: Revert migration (rollback test)
        run: npm run migration:revert
        continue-on-error: true

  # ── Job 4: Docker production build (main only) ───────────────────────────────
  docker-build:
    name: Docker Production Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -f Dockerfile.prod -t stockmind-api:${{ github.sha }} .

      - name: Report image size
        run: |
          SIZE=$(docker image inspect stockmind-api:${{ github.sha }} --format '{{.Size}}')
          MB=$(echo "$SIZE 1048576" | awk '{printf "%.1f", $1/$2}')
          echo "Image size: ${MB} MB"
          # Fail if image exceeds 300 MB
          LIMIT=314572800
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "ERROR: Image exceeds 300 MB limit"
            exit 1
          fi
