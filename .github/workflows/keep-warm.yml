name: Keep backend warm

# The API runs on a free-tier managed host that spins the instance down after
# ~15 min of inactivity. A cold start then costs 20-50s, long enough to time out
# the mobile client's first request (register/login). This workflow pings the
# public health endpoint on a schedule so the instance stays warm and real users
# never pay the cold-start penalty. Zero manual server ops — it runs itself.
#
# Note: GitHub-scheduled workflows are best-effort and may be delayed under load,
# and the schedule is auto-disabled after 60 days of no repo activity. The 30s
# client timeout remains the safety net for the rare cold start that slips through.

on:
  schedule:
    # Every 10 minutes. Cron granularity on GitHub is 5 min minimum.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          URL="https://stockmind-api-vmht.onrender.com/api/v1/health"
          # Retry a few times: if the instance is cold, the first request wakes
          # it and may take up to ~60s, so allow a generous per-request timeout.
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 "$URL" || echo "000")
            echo "attempt ${attempt}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "Backend is warm."
              exit 0
            fi
            sleep 10
          done
          echo "Health check did not return 200 after 3 attempts." >&2
          exit 1
